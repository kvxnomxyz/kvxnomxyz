<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Featured Websites</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        margin: 0;
        padding: 20px;
    }

    h1 {
        text-align: center;
    }

    #websites {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }

    .card {
        background: #1b1b1b;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 12px rgba(0,0,0,.4);
        transition: transform .2s;
    }

    .card:hover {
        transform: translateY(-4px);
    }

    .banner {
        width: 100%;
        height: 180px;
        object-fit: cover;
        background: #222;
    }

    .content {
        padding: 16px;
    }

    .title {
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: 8px;
    }

    .description {
        color: #ccc;
        margin-bottom: 12px;
    }

    .visit {
        display: inline-block;
        padding: 10px 14px;
        background: #4f46e5;
        color: white;
        text-decoration: none;
        border-radius: 6px;
    }

    .visit:hover {
        background: #6366f1;
    }

    .loading {
        text-align: center;
        margin-top: 40px;
        color: #aaa;
    }
</style>
</head>
<body>

<h1>Featured Websites</h1>

<div id="websites">
    <div class="loading">Loading websites...</div>
</div>

<script>
const OWNER = "kvxnomxyz";
const REPO = "kvxnomxyz";
const FEATURED_DIR = "featuredwebsites";

const githubRaw = (path) =>
    `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${path}`;

const githubApi = (path) =>
    `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`;

async function getTextFile(path) {
    try {
        const res = await fetch(githubRaw(path));
        if (!res.ok) return null;
        return (await res.text()).trim();
    } catch {
        return null;
    }
}

async function fileExists(path) {
    try {
        const res = await fetch(githubRaw(path), { method: "HEAD" });
        return res.ok;
    } catch {
        return false;
    }
}

async function loadWebsites() {
    const container = document.getElementById("websites");

    try {
        const foldersRes = await fetch(githubApi(FEATURED_DIR));
        const folders = await foldersRes.json();

        const defaultBanner =
            githubRaw("defaultbanner.png");

        const cards = await Promise.all(
            folders
                .filter(item => item.type === "dir")
                .map(async folder => {

                    const base = `${FEATURED_DIR}/${folder.name}`;

                    const link =
                        await getTextFile(`${base}/link.txt`);

                    if (!link)
                        return null;

                    const title =
                        await getTextFile(`${base}/title.txt`) ||
                        link;

                    const description =
                        await getTextFile(`${base}/description.txt`) ||
                        "";

                    const customBanner =
                        await fileExists(`${base}/banner.png`);

                    const banner = customBanner
                        ? githubRaw(`${base}/banner.png`)
                        : defaultBanner;

                    return `
                        <div class="card">
                            <img
                                class="banner"
                                src="${banner}"
                                alt="${title}"
                            >

                            <div class="content">
                                <div class="title">
                                    ${escapeHtml(title)}
                                </div>

                                <div class="description">
                                    ${escapeHtml(description)}
                                </div>

                                <a
                                    class="visit"
                                    href="${link}"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                >
                                    Visit Website
                                </a>
                            </div>
                        </div>
                    `;
                })
        );

        container.innerHTML =
            cards.filter(Boolean).join("");

        if (!container.innerHTML.trim()) {
            container.innerHTML =
                "<div class='loading'>No websites found.</div>";
        }

    } catch (err) {
        console.error(err);
        container.innerHTML =
            "<div class='loading'>Failed to load websites.</div>";
    }
}

function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

loadWebsites();
</script>

</body>
</html>
